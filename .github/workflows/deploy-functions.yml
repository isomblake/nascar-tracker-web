name: Deploy Supabase edge functions

# Triggers when edge function source changes on main or the active dev branch.
# Always deploys with --no-verify-jwt (the PWA uses a publishable key, not a JWT).
on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'cloud/supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy detect-session
        run: supabase functions deploy detect-session --project-ref ofqqgbgxoywnqoukvwth --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PAT }}

      - name: Deploy poll-nascar
        run: supabase functions deploy poll-nascar --project-ref ofqqgbgxoywnqoukvwth --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PAT }}

      - name: Deploy stop-session
        run: supabase functions deploy stop-session --project-ref ofqqgbgxoywnqoukvwth --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_PAT }}
