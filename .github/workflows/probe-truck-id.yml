name: Probe — find live Truck series race ID

on:
  push:
    branches:
      - claude/fix-jwt-auth-8dJNd
    paths:
      - '.github/workflows/probe-truck-id.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan series_3 IDs 1-6000 for live session
        run: |
          python3 - <<'PYEOF' | tee probe_results.txt
          import json, sys
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import urllib.request

          def check(race_id):
              try:
                  url = f"https://cf.nascar.com/cacher/live/series_3/{race_id}/live-feed.json"
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=4) as r:
                      d = json.loads(r.read())
                      fs = d.get("flag_state", 0)
                      return race_id, d.get("track_name", ""), d.get("run_name", ""), fs, d.get("run_type", 0)
              except Exception:
                  return None

          hits = []
          with ThreadPoolExecutor(max_workers=150) as ex:
              futures = {ex.submit(check, i): i for i in range(1, 6001)}
              for fut in as_completed(futures):
                  result = fut.result()
                  if result and result[3] is not None:
                      hits.append(result)

          live = [h for h in hits if h[3] in [1, 2, 8]]
          all_hits = sorted(hits, key=lambda x: x[0])

          print("=== LIVE SESSIONS ===")
          if live:
              for h in sorted(live, key=lambda x: x[0]):
                  print(f"LIVE series_3 id={h[0]}  flag={h[3]}  type={h[4]}  track={h[1]}  run={h[2]}")
          else:
              print("No live series_3 session in range 1-6000")

          print(f"\n=== ALL HITS ({len(all_hits)} total IDs with data) ===")
          for h in all_hits[-20:]:
              print(f"  id={h[0]}  flag={h[3]}  type={h[4]}  track={h[1]}")
          PYEOF

      - name: Commit results
        run: |
          git config user.email "probe-bot@nascar-tracker"
          git config user.name "Probe Bot"
          git add probe_results.txt
          git commit -m "probe: series_3 ID scan results" || echo "nothing to commit"
          git push origin claude/fix-jwt-auth-8dJNd
