name: Fix JWT Auth — disable verify_jwt on edge functions

on:
  push:
    branches:
      - claude/fix-jwt-auth-8dJNd
  workflow_dispatch:

jobs:
  disable-jwt-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Disable verify_jwt on detect-session
        run: |
          result=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PATCH \
            "https://api.supabase.com/v1/projects/ofqqgbgxoywnqoukvwth/functions/detect-session" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"verify_jwt": false}')
          echo "detect-session: $result"

      - name: Disable verify_jwt on poll-nascar
        run: |
          result=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PATCH \
            "https://api.supabase.com/v1/projects/ofqqgbgxoywnqoukvwth/functions/poll-nascar" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"verify_jwt": false}')
          echo "poll-nascar: $result"

      - name: Disable verify_jwt on stop-session
        run: |
          result=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PATCH \
            "https://api.supabase.com/v1/projects/ofqqgbgxoywnqoukvwth/functions/stop-session" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            -H "Content-Type: application/json" \
            -d '{"verify_jwt": false}')
          echo "stop-session: $result"

      - name: Verify settings
        run: |
          curl -s \
            "https://api.supabase.com/v1/projects/ofqqgbgxoywnqoukvwth/functions" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PAT }}" \
            | python3 -c "
          import json, sys
          fns = json.load(sys.stdin)
          for f in fns:
              print(f['slug'], '→ verify_jwt:', f.get('verify_jwt'))
          "
